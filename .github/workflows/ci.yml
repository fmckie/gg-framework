name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cross-platform smoke matrix. Every push to main and every PR runs build +
# typecheck + test + bin-smoke on macOS, Linux, and Windows so we catch
# platform-specific regressions before they hit npm.
#
# We deliberately keep the editor and Pixel packages out of the matrix for now:
# their heavier native dependencies slow CI without improving coverage of the
# release-critical @kleio/ai, @kleio/agent, @kleio/coder, and @kleio/manager set.

jobs:
  test:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.x]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: |
          pnpm --filter @kleio/ai build
          pnpm --filter @kleio/agent build
          pnpm --filter @kleio/coder build
          pnpm --filter @kleio/manager build

      - name: Typecheck
        run: |
          pnpm --filter @kleio/ai check
          pnpm --filter @kleio/agent check
          pnpm --filter @kleio/coder check
          pnpm --filter @kleio/manager check

      - name: Test framework packages
        run: |
          pnpm --filter @kleio/ai test
          pnpm --filter @kleio/agent test
          pnpm --filter @kleio/coder test
          pnpm --filter @kleio/manager test

      - name: Kleio Manager CLI smoke
        run: node packages/gg-boss/dist/cli.js --help && node packages/gg-boss/dist/cli.js --version
        shell: bash
