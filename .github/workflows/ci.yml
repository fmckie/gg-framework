name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cross-platform smoke matrix. Every push to main and every PR runs build +
# typecheck + test + bin-smoke on macOS, Linux, and Windows so we catch
# platform-specific regressions before they hit npm.
#
# We deliberately keep the gg-editor + gg-pixel packages out of the matrix
# for now — they have heavier native deps (sharp, transformers) that slow CI
# without buying us much for the framework's release-critical packages
# (gg-ai, gg-agent, ggcoder, gg-boss).

jobs:
  test:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.x]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: |
          pnpm --filter @kleio/ai build
          pnpm --filter @kleio/agent build
          pnpm --filter @kleio/coder build
          pnpm --filter @kleio/manager build

      - name: Typecheck
        run: |
          pnpm --filter @kleio/ai check
          pnpm --filter @kleio/agent check
          pnpm --filter @kleio/coder check
          pnpm --filter @kleio/manager check

      - name: Test framework packages
        run: |
          pnpm --filter @kleio/ai test
          pnpm --filter @kleio/agent test
          pnpm --filter @kleio/coder test
          pnpm --filter @kleio/manager test

      - name: ggboss CLI smoke (extra belt-and-braces)
        run: node packages/gg-boss/dist/cli.js --help
        shell: bash
