<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GG Editor</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font: 12px -apple-system, "Segoe UI", sans-serif;
        margin: 0;
        padding: 12px;
        background: #1f2937;
        color: #e5e7eb;
      }
      h1 {
        font-size: 13px;
        font-weight: 700;
        color: #60a5fa;
        margin: 0 0 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        border-bottom: 1px solid #374151;
      }
      .row:last-child {
        border-bottom: none;
      }
      .muted {
        color: #9ca3af;
      }
      .pill {
        background: #374151;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 11px;
      }
      .pill.ok {
        background: #064e3b;
        color: #a7f3d0;
      }
      .pill.err {
        background: #7f1d1d;
        color: #fecaca;
      }
      .controls {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      input[type="number"] {
        flex: 1;
        background: #111827;
        color: #e5e7eb;
        border: 1px solid #374151;
        border-radius: 3px;
        padding: 4px 6px;
        font: inherit;
      }
      label {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      code {
        background: #111827;
        padding: 1px 4px;
        border-radius: 2px;
        font-family: ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <h1>GG Editor (UXP)</h1>

    <div class="row"><span class="muted">Status</span><span id="status" class="pill">idle</span></div>
    <div class="row"><span class="muted">Connected to</span><span id="endpoint" class="pill">—</span></div>
    <div class="row"><span class="muted">Requests</span><span id="reqs">0</span></div>
    <div class="row"><span class="muted">Last error</span><span id="lastErr" class="muted">—</span></div>

    <div class="controls">
      <div class="field">
        <span class="muted">Port</span>
        <input id="port" type="number" min="1024" max="65535" />
        <sp-button id="connectBtn" size="s" variant="primary">Connect</sp-button>
      </div>
      <label>
        <sp-checkbox id="autoConnect"></sp-checkbox>
        <span>Connect on launch</span>
      </label>
    </div>

    <div class="row" style="margin-top: 10px"><span class="muted">CLI</span><code>ggeditor --host premiere</code></div>

    <script src="main.js"></script>
  </body>
</html>
