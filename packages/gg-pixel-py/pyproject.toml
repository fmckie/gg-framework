[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gg-pixel"
version = "4.3.68"
description = "Universal error tracking pixel optimized for autonomous coding agents — Python SDK"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Ken Kai" }]
requires-python = ">=3.8"
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
]
# Zero runtime dependencies — uses urllib from stdlib.
dependencies = []

[project.urls]
Homepage = "https://github.com/kenkaiiii/gg-framework"

[tool.hatch.build.targets.wheel]
packages = ["src/gg_pixel"]

[tool.hatch.build.targets.sdist]
include = ["src", "tests", "README.md"]
