[package]
name = "gg-pixel"
version = "4.3.72"
edition = "2021"
description = "Universal error tracking pixel optimized for autonomous coding agents — Rust SDK"
license = "MIT"
repository = "https://github.com/kenkaiiii/gg-framework"
readme = "README.md"
keywords = ["error-tracking", "panic", "monitoring", "telemetry"]
categories = ["development-tools::debugging"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = { version = "2.10", default-features = false, features = ["tls"] }
sha2 = "0.10"
backtrace = "0.3"
uuid = { version = "1.10", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

[dev-dependencies]
ureq = { version = "2.10", default-features = false, features = ["tls", "json"] }
